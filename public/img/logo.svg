<svg width="333" height="96" viewBox="0 0 333 96" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- NBB Green -->
    <linearGradient id="gNBB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f9d58"/>
      <stop offset="100%" stop-color="#006c3f"/>
    </linearGradient>

    <!-- WiFiber Gradient -->
    <linearGradient id="gWiFiber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007bff"/>
      <stop offset="25%" stop-color="#00c6ff"/>
      <stop offset="50%" stop-color="#7b2cff"/>
      <stop offset="75%" stop-color="#ff3cac"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>

    <!-- Line Gradient -->
    <linearGradient id="gLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#2979ff"/>
    </linearGradient>
  </defs>

  <!-- Signal Bars -->
  <rect x="5" y="60" width="8" height="20" rx="3" fill="url(#gNBB)"/>
  <rect x="18" y="50" width="8" height="30" rx="3" fill="url(#gNBB)"/>
  <rect x="31" y="38" width="8" height="42" rx="3" fill="url(#gNBB)"/>
  <rect x="44" y="25" width="8" height="55" rx="3" fill="url(#gNBB)"/>

  <!-- NBB -->
  <text x="65" y="60" font-size="36" font-weight="bold" fill="url(#gNBB)" font-family="Arial">
    NBB
  </text>

  <!-- WiFiber -->
  <text x="150" y="60" font-size="32" font-weight="bold" fill="url(#gWiFiber)" font-family="Arial">
    WiFiber
  </text>

  <!-- WiFi Icon -->
  <path d="M260 30 Q280 10 300 30" stroke="#2196f3" stroke-width="3" fill="none"/>
  <path d="M265 35 Q280 20 295 35" stroke="#2196f3" stroke-width="3" fill="none"/>
  <circle cx="280" cy="40" r="3" fill="#2196f3"/>

  <!-- Line -->
  <rect x="65" y="70" width="200" height="3" fill="url(#gLine)"/>

  <!-- Tagline -->
  <text x="65" y="88" font-size="10" fill="#555" font-family="Arial" letter-spacing="2">
    NATIONAL BROADBAND
  </text>

  <!-- Cybernet -->
  <rect x="250" y="70" rx="6" width="75" height="20" fill="#e60023"/>
  <text x="257" y="85" font-size="11" fill="#fff" font-family="Arial">
    CYBERNET
  </text>

</svg>