<svg width="333" height="96" viewBox="0 0 333 96" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- NBB Green -->
    <linearGradient id="gNBB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>

    <!-- WiFiber Gradient -->
    <linearGradient id="gWiFiber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Bars (Sharp) -->
  <rect x="5" y="60" width="8" height="20" rx="2" fill="url(#gNBB)"/>
  <rect x="18" y="50" width="8" height="30" rx="2" fill="url(#gNBB)"/>
  <rect x="31" y="38" width="8" height="42" rx="2" fill="url(#gNBB)"/>
  <rect x="44" y="25" width="8" height="55" rx="2" fill="url(#gNBB)"/>

  <!-- NBB -->
  <text x="65" y="60" font-size="36" font-weight="700"
        fill="url(#gNBB)" font-family="Arial">
    NBB
  </text>

  <!-- WiFiber -->
  <text x="150" y="60" font-size="32" font-weight="700"
        fill="url(#gWiFiber)" font-family="Arial">
    WiFiber
  </text>

  <!-- WiFi Icon (clean lines) -->
  <path d="M260 30 Q280 10 300 30"
        stroke="#0ea5e9" stroke-width="2.5"
        fill="none"/>

  <path d="M265 35 Q280 20 295 35"
        stroke="#6366f1" stroke-width="2.5"
        fill="none"/>

  <circle cx="280" cy="40" r="2.8" fill="#a855f7"/>

  <!-- Divider Line -->
  <rect x="65" y="70" width="200" height="2"
        fill="url(#gWiFiber)"/>

  <!-- Tagline -->
  <text x="65" y="88" font-size="10"
        fill="#64748b" font-family="Arial" letter-spacing="2">
    NATIONAL BROADBAND
  </text>

  <!-- CyberNet Badge -->
  <rect x="250" y="70" rx="4" width="75" height="18" fill="#dc2626"/>
  <text x="257" y="83" font-size="10" fill="#fff" font-family="Arial">
    CYBERNET
  </text>

</svg>
